<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>选龙头 — 神龙发射台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a12;font-family:'Segoe UI',system-ui,sans-serif;color:#fff;min-height:100vh;padding:40px 20px}
h1{text-align:center;font-size:2em;background:linear-gradient(135deg,#f59e0b,#ef4444);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.sub{text-align:center;color:#888;margin-bottom:40px;font-size:0.95em}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:24px;max-width:1100px;margin:0 auto}
.card{background:linear-gradient(135deg,#1a1a2e,#16213e);border-radius:16px;overflow:hidden;border:2px solid #1e293b;transition:all .3s;cursor:pointer;text-align:center;padding-bottom:20px}
.card:hover{border-color:#f59e0b;transform:translateY(-4px);box-shadow:0 8px 30px rgba(245,158,11,.2)}
.card.selected{border-color:#22c55e;box-shadow:0 8px 30px rgba(34,197,94,.3)}
.card img{width:100%;aspect-ratio:1;object-fit:contain;background:radial-gradient(ellipse at center,rgba(245,158,11,.08) 0%,transparent 70%)}
.label{font-weight:700;font-size:1.15em;margin-top:12px}
.desc{color:#94a3b8;font-size:.85em;margin-top:4px;padding:0 12px}
.btn-bar{display:flex;justify-content:center;gap:12px;margin-top:40px;flex-wrap:wrap}
.btn{padding:12px 32px;border-radius:30px;font-size:1em;font-weight:700;border:none;cursor:pointer;transition:all .25s}
.btn-confirm{background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff}
.btn-confirm:hover{box-shadow:0 4px 20px rgba(239,68,68,.4);transform:scale(1.03)}
.btn-confirm:disabled{opacity:0.4;cursor:not-allowed}
.btn-more{background:transparent;border:2px solid #f59e0b;color:#f59e0b}
.btn-more:hover{background:rgba(245,158,11,.1)}
.radio{display:inline-block;width:20px;height:20px;border-radius:50%;border:2px solid #475569;margin-right:8px;vertical-align:middle;position:relative;top:-1px}
.selected .radio{border-color:#22c55e;background:#22c55e;box-shadow:0 0 8px rgba(34,197,94,.6)}
#selected-name{color:#f59e0b;font-weight:700}
</style>
</head>
<body>
<h1>🐲 选龙头</h1>
<p class="sub">点击选中一张，确认后替换到神龙发射台英雄区</p>

<div class="grid" id="grid">
  <div class="card" data-id="1" onclick="select(this)">
    <img src="dragon-1-roaring.png" alt="怒吼火龙">
    <div class="label"><span class="radio"></span> 怒吼火龙</div>
    <div class="desc">张口咆哮、金焰喷薄、赤金鳞片 — 最具攻击性</div>
  </div>
  <div class="card" data-id="2" onclick="select(this)">
    <img src="dragon-2-celestial.png" alt="天青龙">
    <div class="label"><span class="radio"></span> 天青龙</div>
    <div class="desc">对称肃穆、碧玉金鳞、仙韵内敛 — 神圣威严</div>
  </div>
  <div class="card" data-id="3" onclick="select(this)">
    <img src="dragon-3-dark.png" alt="暗黑龙">
    <div class="label"><span class="radio"></span> 暗黑龙</div>
    <div class="desc">紫瞳摄魂、黑赤鳞甲、压迫感强 — 暗黑霸道</div>
  </div>
  <div class="card" data-id="4" onclick="select(this)">
    <img src="dragon-4-golden.png" alt="金帝龙">
    <div class="label"><span class="radio"></span> 金帝龙</div>
    <div class="desc">流光金鳞、口衔宝珠、帝皇气象 — 至尊祥瑞</div>
  </div>
  <div class="card" data-id="5" onclick="select(this)">
    <img src="dragon-5-ice.png" alt="冰晶龙">
    <div class="label"><span class="radio"></span> 冰晶龙</div>
    <div class="desc">冰蓝透鳞、寒息凛冽、霜角晶莹 — 冰雪玄幻</div>
  </div>
  <div class="card" data-id="6" onclick="select(this)">
    <img src="dragon-6-ink.png" alt="水墨龙">
    <div class="label"><span class="radio"></span> 水墨龙</div>
    <div class="desc">墨韵狂草、笔锋凌厉、留白写意 — 国风禅意</div>
  </div>
</div>

<div class="btn-bar">
  <button class="btn btn-more" onclick="location.reload()">🎲 刷新页面</button>
  <button class="btn btn-confirm" onclick="confirmPick()" id="confirmBtn" disabled>✅ 确认选中：<span id="selected-name">未选</span></button>
</div>

<script>
let picked = null
const names = ['roaring','celestial','dark','golden','ice','ink']
const labels = ['怒吼火龙','天青龙','暗黑龙','金帝龙','冰晶龙','水墨龙']

function select(el) {
  document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'))
  el.classList.add('selected')
  picked = el.dataset.id
  document.getElementById('selected-name').textContent = labels[picked-1]
  document.getElementById('confirmBtn').disabled = false
}

function confirmPick() {
  if (!picked) return
  alert('已选中「' + labels[picked-1] + '」！告诉小钢炮助手："选第 ' + picked + ' 号龙头" 即可替换到发射台。')
}
</script>
</body>
</html>
